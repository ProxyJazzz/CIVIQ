steps:
  # 1. Build the container image using the Docker build cache
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/civiq-repo/civiq-app:$COMMIT_SHA'
      - '-t'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/civiq-repo/civiq-app:latest'
      - '--cache-from'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/civiq-repo/civiq-app:latest'
      - '--build-arg'
      - 'NEXT_PUBLIC_SUPABASE_URL=$_NEXT_PUBLIC_SUPABASE_URL'
      - '--build-arg'
      - 'NEXT_PUBLIC_SUPABASE_ANON_KEY=$_NEXT_PUBLIC_SUPABASE_ANON_KEY'
      - '.'

  # 2. Push the built image with Commit SHA tag to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/civiq-repo/civiq-app:$COMMIT_SHA'

  # 3. Push the built image with Latest tag to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/civiq-repo/civiq-app:latest'

  # 4. Deploy the container image to Google Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'civiq-service'
      - '--image'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/civiq-repo/civiq-app:$COMMIT_SHA'
      - '--region'
      - 'asia-south1'
      - '--platform'
      - 'managed'
      - '--port'
      - '8080'
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '2'
      - '--concurrency'
      - '80'
      - '--timeout'
      - '300'
      - '--allow-unauthenticated'

images:
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/civiq-repo/civiq-app:$COMMIT_SHA'
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/civiq-repo/civiq-app:latest'
